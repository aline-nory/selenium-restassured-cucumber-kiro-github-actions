# Configuracoes globais do Cucumber

# Filtragem por tags (pode ser sobrescrita via linha de comando)
# Exemplos de uso via Maven:
#   mvn test -Dcucumber.filter.tags="@smoke"
#   mvn test -Dcucumber.filter.tags="@regressao and not @wip"
# cucumber.filter.tags=@smoke

# Plugins de saida
cucumber.plugin=pretty,html:target/cucumber-reports/cucumber.html,json:target/cucumber-reports/cucumber.json

# Exibe cores no console
cucumber.monochrome=true
