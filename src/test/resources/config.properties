# ============================================================
# Configuracoes de Ambiente
# Executar em outro ambiente: mvn test -Denvironment=HQA
# ============================================================

# Ambiente padrao
environment=DEV

# URLs Web por ambiente
url_DEV=https://opensource-demo.orangehrmlive.com/web/index.php/auth/login
url_HQA=https://opensource-demo.orangehrmlive.com/web/index.php/auth/login

# URLs API por ambiente
api_DEV=https://jsonplaceholder.typicode.com
api_HQA=https://jsonplaceholder.typicode.com

# Navegador
browser=chrome
forceBrowser=false
domain=orangehrm

# Timeouts (segundos)
timeout.implicit=10
timeout.pageLoad=30
timeout.explicit=10

# Evidencias
# Opcoes: always | failure_only
screenshot.mode=failure_only

# ============================================================
# Credenciais de TESTE (apenas ambientes de desenvolvimento)
#
# IMPORTANTE: Em ambientes corporativos, use a hierarquia:
#   1. config.properties — credenciais de teste/dev (commitavel)
#   2. Variaveis de ambiente — CI/CD (configuradas no pipeline)
#   3. Secrets Manager (Vault, AWS Secrets) — producao (nunca no codigo)
#
# Para override via variavel de ambiente no CI:
#   export USUARIO_ADMIN=admin
#   export SENHA_ADMIN=admin123
# ============================================================
usuario.admin=admin
senha.admin=admin123
senha.invalida=senhaErrada
