name: Automacao de Testes - Selenium + REST Assured

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Padrao restritivo (least privilege): cada job declara apenas o que precisa.
permissions:
  contents: read

jobs:
  testes:
    name: Executar Testes (UI + API)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write  # necessario para o mikepenz/action-junit-report publicar o resumo

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Instalar Google Chrome + ChromeDriver compativel
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-chromedriver: true

      - name: Executar testes Maven
        run: mvn test --no-transfer-progress
        env:
          CI: true
          # Em um ambiente real, credenciais viriam de GitHub Secrets (nunca hardcoded):
          # SENHA_ADMIN: ${{ secrets.SENHA_ADMIN }}

      - name: Publicar relatorio Cucumber
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-report-${{ github.run_number }}
          path: target/cucumber-reports/
          retention-days: 30

      - name: Publicar resultado JUnit
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: target/cucumber-reports/cucumber.xml
          detailed_summary: true
          include_passed: true

      - name: Upload allure-results (para o job de publicacao)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: target/allure-results
          retention-days: 7

  publicar-relatorio:
    name: Publicar Allure Report (GitHub Pages)
    needs: testes
    # So publica em push para main - uma PR nunca deve sobrescrever o relatorio publico.
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Baixar allure-results do job de testes
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

      - name: Gerar relatorio Allure
        uses: simple-elf/allure-report-action@v1.14
        if: always()
        with:
          allure_results: target/allure-results
          allure_history: allure-history

      - name: Publicar Allure Report no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history